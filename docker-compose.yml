services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8080:8080"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
